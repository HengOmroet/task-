<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KickStore - Sneakers</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        color: #111;
      }

      /* NAVBAR */
      nav {
        background: #111;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 30px;
        position: sticky;
        top: 0;
        z-index: 10;
      }
      .logo {
        font-size: 20px;
        font-weight: bold;
        letter-spacing: 3px;
        color: #fff;
      }
      nav ul {
        list-style: none;
        display: flex;
        gap: 20px;
      }
      nav ul a {
        text-decoration: none;
        color: #aaa;
        font-size: 14px;
      }
      nav ul a:hover {
        color: #fff;
      }
      .cart-btn {
        background: #fff;
        color: #111;
        border: none;
        padding: 8px 18px;
        cursor: pointer;
        font-size: 13px;
        font-weight: bold;
      }
      .cart-btn:hover {
        background: #ddd;
      }

      /* PRODUCTS */
      .section-title {
        text-align: center;
        padding: 36px 20px 10px;
        font-size: 22px;
        font-weight: bold;
        letter-spacing: 1px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 18px;
        padding: 20px 30px 60px;
      }

      .card {
        background: #fff;
        border: 1px solid #e0e0e0;
        cursor: pointer;
        transition: box-shadow 0.2s;
      }
      .card:hover {
        box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
      }
      .card-img {
        height: 180px;
        background: #f5f5f5;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 70px;
      }
      .card-info {
        padding: 12px;
      }
      .card-brand {
        font-size: 11px;
        color: #e00;
        font-weight: bold;
        text-transform: uppercase;
        margin-bottom: 3px;
      }
      .card-name {
        font-size: 14px;
        font-weight: bold;
        margin-bottom: 4px;
      }
      .card-cat {
        font-size: 11px;
        color: #888;
        margin-bottom: 6px;
        text-transform: uppercase;
      }
      .card-price {
        font-size: 15px;
        font-weight: bold;
      }
      .card-old {
        font-size: 12px;
        color: #aaa;
        text-decoration: line-through;
        margin-left: 6px;
      }
      .badge {
        display: inline-block;
        font-size: 10px;
        font-weight: bold;
        padding: 2px 7px;
        margin-bottom: 6px;
        color: #fff;
      }
      .badge-new {
        background: #111;
      }
      .badge-sale {
        background: #e00;
      }
      .badge-hot {
        background: #e67e00;
      }

      /* MODAL */
      .overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        z-index: 100;
        align-items: center;
        justify-content: center;
      }
      .overlay.open {
        display: flex;
      }
      .modal {
        background: #fff;
        max-width: 680px;
        width: 95%;
        max-height: 88vh;
        display: flex;
        overflow: hidden;
        position: relative;
      }
      .modal-img {
        width: 38%;
        background: #f5f5f5;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 90px;
        flex-shrink: 0;
      }
      .modal-body {
        flex: 1;
        padding: 26px;
        overflow-y: auto;
      }
      .modal-close {
        position: absolute;
        top: 10px;
        right: 12px;
        background: #111;
        color: #fff;
        border: none;
        width: 28px;
        height: 28px;
        cursor: pointer;
        font-size: 14px;
      }
      .modal-brand {
        font-size: 12px;
        color: #e00;
        font-weight: bold;
        text-transform: uppercase;
        margin-bottom: 4px;
      }
      .modal-name {
        font-size: 20px;
        font-weight: bold;
        margin-bottom: 10px;
      }
      .modal-price-row {
        margin-bottom: 14px;
      }
      .modal-price {
        font-size: 22px;
        font-weight: bold;
      }
      .modal-old {
        font-size: 13px;
        color: #aaa;
        text-decoration: line-through;
        margin-left: 8px;
      }
      .modal-desc {
        font-size: 13px;
        color: #555;
        line-height: 1.7;
        margin-bottom: 16px;
        border-top: 1px solid #eee;
        padding-top: 14px;
      }
      .modal-label {
        font-size: 12px;
        font-weight: bold;
        text-transform: uppercase;
        margin-bottom: 8px;
      }
      .size-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 18px;
      }
      .sz {
        border: 1px solid #ccc;
        background: #fff;
        padding: 6px 10px;
        cursor: pointer;
        font-size: 12px;
      }
      .sz.picked {
        background: #111;
        color: #fff;
        border-color: #111;
      }
      .sz:disabled {
        opacity: 0.35;
        cursor: not-allowed;
        text-decoration: line-through;
      }
      .atc {
        width: 100%;
        background: #111;
        color: #fff;
        border: none;
        padding: 13px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
      }
      .atc:hover {
        background: #333;
      }

      /* CART DRAWER */
      .cart-drawer {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: 300px;
        background: #fff;
        border-left: 1px solid #ddd;
        transform: translateX(100%);
        transition: transform 0.3s;
        z-index: 200;
        display: flex;
        flex-direction: column;
      }
      .cart-drawer.open {
        transform: translateX(0);
      }
      .cart-head {
        padding: 14px 18px;
        background: #111;
        color: #fff;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .cart-head h3 {
        margin: 0;
        font-size: 15px;
      }
      .cart-head button {
        background: none;
        border: none;
        color: #fff;
        font-size: 20px;
        cursor: pointer;
      }
      .cart-list {
        flex: 1;
        overflow-y: auto;
        padding: 14px;
      }
      .cart-empty {
        text-align: center;
        color: #aaa;
        padding: 40px 0;
        font-size: 14px;
      }
      .ci {
        display: flex;
        gap: 10px;
        padding: 10px 0;
        border-bottom: 1px solid #eee;
      }
      .ci-img {
        width: 50px;
        height: 50px;
        background: #f5f5f5;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        flex-shrink: 0;
      }
      .ci-info {
        flex: 1;
      }
      .ci-name {
        font-size: 13px;
        font-weight: bold;
        margin-bottom: 2px;
      }
      .ci-meta {
        font-size: 11px;
        color: #888;
        margin-bottom: 3px;
      }
      .ci-price {
        font-size: 13px;
        font-weight: bold;
      }
      .ci-rm {
        background: none;
        border: none;
        color: #aaa;
        cursor: pointer;
        font-size: 17px;
      }
      .ci-rm:hover {
        color: #e00;
      }
      .cart-foot {
        padding: 14px 18px;
        border-top: 1px solid #ddd;
      }
      .cart-row {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        margin-bottom: 5px;
        color: #555;
      }
      .cart-row.total {
        font-size: 15px;
        font-weight: bold;
        color: #111;
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid #ddd;
      }
      .checkout-btn {
        width: 100%;
        background: #111;
        color: #fff;
        border: none;
        padding: 13px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 12px;
      }
      .checkout-btn:hover {
        background: #333;
      }

      /* TOAST */
      .toast {
        position: fixed;
        bottom: 22px;
        left: 50%;
        transform: translateX(-50%) translateY(60px);
        background: #111;
        color: #fff;
        padding: 10px 22px;
        font-size: 13px;
        z-index: 999;
        transition: transform 0.3s;
        white-space: nowrap;
      }
      .toast.show {
        transform: translateX(-50%) translateY(0);
      }

      footer {
        background: #111;
        color: #666;
        text-align: center;
        padding: 20px;
        font-size: 13px;
      }

      @media (max-width: 600px) {
        nav ul {
          display: none;
        }
        .grid {
          padding: 16px;
          grid-template-columns: repeat(2, 1fr);
          gap: 12px;
        }
        .modal {
          flex-direction: column;
        }
        .modal-img {
          width: 100%;
          height: 160px;
        }
        .cart-drawer {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <!-- NAVBAR -->

    <nav>
      <div class="logo">KICKSTORE</div>
      <ul>
        <li><a href="#">Men</a></li>
        <li><a href="#">Women</a></li>
        <li><a href="#">New Drops</a></li>
        <li><a href="#">Sale</a></li>
      </ul>
      <button class="cart-btn" onclick="toggleCart()">
        🛍 Cart (<span id="cartCount">0</span>)
      </button>
    </nav>

    <!-- PRODUCTS -->

    <p class="section-title">Latest Sneakers</p>
    <div class="grid" id="grid"></div>

    <footer>© 2025 KickStore. All rights reserved.</footer>

    <!-- MODAL -->

    <div class="overlay" id="overlay" onclick="closeOverlay(event)">
      <div class="modal">
        <button class="modal-close" onclick="closeModal()">✕</button>
        <div class="modal-img" id="mImg">👟</div>
        <div class="modal-body">
          <p class="modal-brand" id="mBrand"></p>
          <h2 class="modal-name" id="mName"></h2>
          <div class="modal-price-row">
            <span class="modal-price" id="mPrice"></span>
            <span class="modal-old" id="mOld"></span>
          </div>
          <p class="modal-desc" id="mDesc"></p>
          <p class="modal-label">
            Size:
            <span
              id="mSizePicked"
              style="font-weight: normal; color: #888; text-transform: none"
            ></span>
          </p>
          <div class="size-row" id="mSizes"></div>
          <button class="atc" onclick="addToCart()">Add to Cart</button>
        </div>
      </div>
    </div>

    <!-- CART DRAWER -->

    <div class="cart-drawer" id="cartDrawer">
      <div class="cart-head">
        <h3>Your Cart</h3>
        <button onclick="toggleCart()">✕</button>
      </div>
      <div class="cart-list" id="cartList">
        <div class="cart-empty">Your cart is empty 👟</div>
      </div>
      <div class="cart-foot" id="cartFoot" style="display: none">
        <div class="cart-row">
          <span>Subtotal</span><span id="cSub">$0</span>
        </div>
        <div class="cart-row"><span>Shipping</span><span>Free</span></div>
        <div class="cart-row total">
          <span>Total</span><span id="cTotal">$0</span>
        </div>
        <button class="checkout-btn">Checkout</button>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      const products = [
        {
          id: 1,
          brand: "Nike",
          name: "Air Max 270",
          cat: "lifestyle",
          price: 149,
          old: null,
          emoji: "👟",
          badge: "new",
          sizes: ["US 7", "US 8", "US 9", "US 10", "US 11"],
          sold: [],
          desc: "Lightweight everyday sneaker with a large Air unit in the heel for all-day comfort. Mesh upper for breathability.",
        },
        {
          id: 2,
          brand: "Adidas",
          name: "Ultraboost 24",
          cat: "running",
          price: 189,
          old: null,
          emoji: "🏃",
          badge: "new",
          sizes: ["US 7", "US 8", "US 9", "US 10", "US 11", "US 12"],
          sold: [],
          desc: "Primeknit upper that adapts to your foot with every stride. BOOST midsole returns energy with each step.",
        },
        {
          id: 3,
          brand: "Jordan",
          name: "Air Jordan 1 High",
          cat: "lifestyle",
          price: 219,
          old: null,
          emoji: "🐂",
          badge: "hot",
          sizes: ["US 7", "US 8", "US 9", "US 10", "US 11"],
          sold: ["US 9"],
          desc: "The iconic basketball shoe turned streetwear staple. Premium leather upper, Air cushioning, Wings logo.",
        },
        {
          id: 4,
          brand: "New Balance",
          name: "990v6",
          cat: "running",
          price: 174,
          old: 200,
          emoji: "⚡",
          badge: "sale",
          sizes: ["US 7", "US 8", "US 9", "US 10", "US 11", "US 12"],
          sold: [],
          desc: "Made in USA. Dual-density foam midsole with suede and mesh upper. The 990 series since 1982.",
        },
        {
          id: 5,
          brand: "Converse",
          name: "Chuck 70 High",
          cat: "lifestyle",
          price: 95,
          old: 115,
          emoji: "⭐",
          badge: "sale",
          sizes: ["US 6", "US 7", "US 8", "US 9", "US 10", "US 11"],
          sold: [],
          desc: "The elevated classic. Higher rubber foxing, cushioned footbed, and premium canvas construction.",
        },
        {
          id: 6,
          brand: "Vans",
          name: "Old Skool Pro",
          cat: "skate",
          price: 82,
          old: null,
          emoji: "🛹",
          badge: null,
          sizes: ["US 7", "US 8", "US 9", "US 10", "US 11"],
          sold: ["US 11"],
          desc: "Skate-tested with UltraCush HD insole, Duracap reinforced underlays, and waffle outsole grip.",
        },
        {
          id: 7,
          brand: "Hoka",
          name: "Clifton 9",
          cat: "running",
          price: 145,
          old: null,
          emoji: "🌊",
          badge: "new",
          sizes: ["US 7", "US 8", "US 9", "US 10", "US 11"],
          sold: [],
          desc: "Maximum cushion, minimal weight. Plush balanced ride with early-stage Meta-Rocker geometry.",
        },
        {
          id: 8,
          brand: "Salomon",
          name: "XT-6 Gore-Tex",
          cat: "outdoor",
          price: 210,
          old: null,
          emoji: "🥾",
          badge: null,
          sizes: ["US 7", "US 8", "US 9", "US 10", "US 11"],
          sold: ["US 7"],
          desc: "Trail-ready with GORE-TEX waterproofing and Contagrip outsole for all-terrain grip.",
        },
      ];

      let cart = [],
        curProd = null,
        selSize = null;

      function renderGrid() {
        document.getElementById("grid").innerHTML = products
          .map(
            (p) => `
<div class="card" onclick="openModal(${p.id})">
<div class="card-img">${p.emoji}</div>
<div class="card-info">
${p.badge ? `<span class="badge badge-${p.badge}">${p.badge.toUpperCase()}</span><br>` : ""}
<p class="card-brand">${p.brand}</p>
<p class="card-name">${p.name}</p>
<p class="card-cat">${p.cat}</p>
<span class="card-price">$${p.price}</span>
${p.old ? `<span class="card-old">$${p.old}</span>` : ""}
</div>
</div>`,
          )
          .join("");
      }

      function openModal(id) {
        const p = products.find((x) => x.id === id);
        curProd = p;
        selSize = null;
        document.getElementById("mImg").textContent = p.emoji;
        document.getElementById("mBrand").textContent =
          p.brand + " — " + p.cat.toUpperCase();
        document.getElementById("mName").textContent = p.name;
        document.getElementById("mPrice").textContent = "$" + p.price;
        document.getElementById("mOld").textContent = p.old ? "$" + p.old : "";
        document.getElementById("mDesc").textContent = p.desc;
        document.getElementById("mSizePicked").textContent = "";
        document.getElementById("mSizes").innerHTML = p.sizes
          .map((s) => {
            const so = p.sold.includes(s);
            return `<button class="sz${so ? " sold" : ""}" ${so ? "disabled" : `onclick="pickSz(this,'${s}')"`}>${s}</button>`;
          })
          .join("");
        document.getElementById("overlay").classList.add("open");
        document.body.style.overflow = "hidden";
      }

      function pickSz(el, s) {
        document
          .querySelectorAll(".sz")
          .forEach((b) => b.classList.remove("picked"));
        el.classList.add("picked");
        selSize = s;
        document.getElementById("mSizePicked").textContent = s;
      }

      function closeOverlay(e) {
        if (e.target === document.getElementById("overlay")) closeModal();
      }
      function closeModal() {
        document.getElementById("overlay").classList.remove("open");
        document.body.style.overflow = "";
      }

      function addToCart() {
        if (!curProd) return;
        const sz = selSize || curProd.sizes[0];
        cart.push({ ...curProd, sz, uid: Date.now() });
        updateCart();
        closeModal();
        showToast(curProd.name + " added to cart!");
      }

      function updateCart() {
        const n = cart.length;
        document.getElementById("cartCount").textContent = n;
        const total = cart.reduce((s, i) => s + i.price, 0);
        document.getElementById("cSub").textContent = "$" + total;
        document.getElementById("cTotal").textContent = "$" + total;
        const listEl = document.getElementById("cartList");
        const footEl = document.getElementById("cartFoot");
        if (n === 0) {
          listEl.innerHTML =
            '<div class="cart-empty">Your cart is empty 👟</div>';
          footEl.style.display = "none";
        } else {
          listEl.innerHTML = cart
            .map(
              (i) => `
<div class="ci">
<div class="ci-img">${i.emoji}</div>
<div class="ci-info">
<p class="ci-name">${i.name}</p>
<p class="ci-meta">${i.brand} · Size: ${i.sz}</p>
<p class="ci-price">$${i.price}</p>
</div>
<button class="ci-rm" onclick="removeItem(${i.uid})">×</button>
</div>`,
            )
            .join("");
          footEl.style.display = "block";
        }
      }

      function removeItem(uid) {
        cart = cart.filter((i) => i.uid !== uid);
        updateCart();
      }
      function toggleCart() {
        document.getElementById("cartDrawer").classList.toggle("open");
      }
      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 2500);
      }

      renderGrid();
    </script>
  </body>
</html>
